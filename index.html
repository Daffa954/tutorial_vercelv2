<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Coba Upload</title>
</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white px-6 py-4 flex items-center justify-between shadow-md">
        <h1 class="text-xl font-bold">My Website</h1>

        <!-- Button Menu -->
        <button id="menuButton"
            class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded-lg transition duration-300 cursor-pointer">
            ☰ Menu
        </button>
    </nav>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/50 hidden z-40">
    </div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-[-300px] w-[280px] h-full bg-white shadow-xl z-50 transition-all duration-300">

        <div class="flex items-center justify-between p-5 border-b">
            <h2 class="text-lg font-bold">Sidebar</h2>

            <button id="closeButton" class="text-red-500 text-2xl font-bold cursor-pointer">
                ×
            </button>
        </div>

        <ul class="p-5 space-y-4">
            <li>
                <a href="#" class="block hover:text-blue-600 transition">
                    Home
                </a>
            </li>

            <li>
                <a href="#" class="block hover:text-blue-600 transition">
                    About
                </a>
            </li>

            <li>
                <a href="#" class="block hover:text-blue-600 transition">
                    Services
                </a>
            </li>

            <li>
                <a href="#" class="block hover:text-blue-600 transition">
                    Contact
                </a>
            </li>
        </ul>
    </aside>

    <!-- Content -->
    <main class="p-6">
        <h1 class="text-3xl font-bold mb-4">
            Navbar + Sidebar
        </h1>

        <p class="text-gray-700">
            Klik tombol menu di navbar untuk membuka sidebar.
        </p>

        <img src="assets/img/download(9).jpeg" alt="Sample Image" class="mt-6 rounded-lg shadow-md"/>
    </main>

    <script src="script.js"></script>
</body>

</html>
